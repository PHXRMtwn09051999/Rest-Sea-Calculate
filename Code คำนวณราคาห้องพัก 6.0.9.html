<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Sea Resort Calculator v6.0.12</title>
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/rsu" rel="stylesheet">
    
    <style>
        :root { --primary-color: #2279a6; --bg-color: #f4f7f6; --accent-color: #e67e22; --ferry-color: #27ae60; }
        body { font-family: 'RSU', sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-family: 'Kalam', cursive; color: var(--primary-color); text-align: center; font-weight: bold; margin: 0 0 30px 0; }
        .lang-switch { text-align: right; margin-bottom: 20px; }
        .lang-switch button { padding: 5px 15px; cursor: pointer; border: 1px solid var(--primary-color); background: #fff; border-radius: 5px; font-family: 'RSU', sans-serif; }
        .lang-switch button.active { background: var(--primary-color); color: #fff; }
        
        .section-title { border-left: 5px solid var(--primary-color); padding-left: 10px; margin: 25px 0 15px 0; font-weight: bold; color: var(--primary-color); font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; }
        select, input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-family: 'RSU', sans-serif; font-size: 16px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .discount-group { background: #fff3e0; padding: 15px; border-radius: 8px; border: 1px dashed var(--accent-color); margin-top: 10px; }
        .ferry-group { background: #e8f5e9; padding: 15px; border-radius: 8px; border: 1px dashed var(--ferry-color); margin-top: 10px; }
        
        button#calculateBtn { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 5px; font-size: 22px; cursor: pointer; margin-top: 25px; font-family: 'RSU', sans-serif; box-shadow: 0 4px 0 #1a5e82; }
        button#calculateBtn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a5e82; }

        #resultArea { margin-top: 30px; padding: 25px; background: #eef7fb; border-left: 5px solid var(--primary-color); white-space: pre-line; line-height: 1.8; font-size: 17px; color: #2c3e50; }
        .copy-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 15px 25px; border-radius: 20px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch">
        <button id="btn-th" class="active" onclick="setLanguage('th')">TH</button>
        <button id="btn-en" onclick="setLanguage('en')">EN</button>
    </div>

    <h1 id="mainTitle">Rest Sea Resort</h1>

    <div class="section-title" id="sec-room">ข้อมูลห้องพัก / Accommodation</div>
    <div class="form-group">
        <label id="lbl-room-type">ประเภทห้องพัก</label>
        <select id="roomType">
            <option value="Twin Villa">Twin Villa</option>
            <option value="Deluxe Villa">Deluxe Villa</option>
            <option value="Deluxe Pool Villa">Deluxe Pool Villa</option>
            <option value="Beachfront Pool Villa">Beachfront Pool Villa</option>
            <option value="Canopy Pool Villa">Canopy Pool Villa</option>
        </select>
    </div>

    <div class="grid-inputs">
        <div class="form-group"><label id="lbl-checkin">เช็คอิน</label><input type="date" id="checkIn"></div>
        <div class="form-group"><label id="lbl-checkout">เช็คเอาท์</label><input type="date" id="checkOut"></div>
    </div>

    <div class="grid-inputs">
        <div class="form-group"><label id="lbl-ext-a">เตียงเสริมผู้ใหญ่ (10+ ปี)</label><input type="number" id="extAdult" value="0" min="0"></div>
        <div class="form-group"><label id="lbl-ext-c">เตียงเสริมเด็ก (4-9 ปี)</label><input type="number" id="extChild" value="0" min="0"></div>
    </div>

    <div class="grid-inputs">
        <div class="form-group"><label id="lbl-bf-c">อาหารเช้าเด็ก 4-9 ปี (พักร่วมเตียงหลัก)</label><input type="number" id="bfChild" value="0" min="0"></div>
        <div class="form-group"><label id="lbl-baby">เด็ก (0-3 ปี) Baby Cot</label><input type="number" id="babyCot" value="0" min="0"></div>
    </div>

    <div class="discount-group">
        <div class="form-group">
            <label id="lbl-disc-label" style="color: var(--accent-color);">ส่วนลดค่าห้องพัก (%)</label>
            <input type="number" id="discountPercent" value="0" min="0" max="100">
        </div>
    </div>

    <div class="section-title" id="sec-ferry">ข้อมูลตั๋วเรือ / Boat Tickets</div>
    <div class="ferry-group">
        <div class="grid-inputs">
            <div class="form-group">
                <label id="lbl-ferry-in">ขาไป (Arrival)</label>
                <select id="ferryIn">
                    <option value="none">-- ไม่จองตั๋วขาไป / No arrival ticket --</option>
                    <option value="บุญศิริ">Boonsiri (600.-)</option>
                    <option value="เสือดำโก">Seudamgo (600.-)</option>
                    <option value="เกาะกูด เอกซ์เพรส">KohKood Express (600.-)</option>
                    <option value="Oceanfront">Oceanfront (700.-)</option>
                </select>
            </div>
            <div class="form-group">
                <label id="lbl-ferry-out">ขากลับ (Departure)</label>
                <select id="ferryOut">
                    <option value="none">-- ไม่จองตั๋วขากลับ / No departure ticket --</option>
                    <option value="บุญศิริ">Boonsiri (600.-)</option>
                    <option value="เสือดำโก">Seudamgo (600.-)</option>
                    <option value="เกาะกูด เอกซ์เพรส">KohKood Express (600.-)</option>
                    <option value="Oceanfront">Oceanfront (700.-)</option>
                </select>
            </div>
        </div>
        <div class="grid-inputs">
            <div class="form-group">
                <label id="lbl-pax-a">ผู้โดยสาร 5 ปีขึ้นไป (จ่ายเต็ม)</label>
                <input type="number" id="paxAdult" value="0" min="0">
            </div>
            <div class="form-group">
                <label id="lbl-pax-c">ผู้โดยสาร 0-4 ปี (เดินทางฟรี)</label>
                <input type="number" id="paxChild" value="0" min="0">
            </div>
        </div>
    </div>

    <button id="calculateBtn" onclick="calculate()">คำนวณราคาทั้งหมด</button>
    <div id="resultArea" style="display:none;"></div>
</div>

<div class="copy-toast" id="toast">คัดลอกรายละเอียดแล้ว! / Copied!</div>

<script>
    let currentLang = 'th';
    const ferryPrice = { "บุญศิริ": 600, "เสือดำโก": 600, "เกาะกูด เอกซ์เพรส": 600, "Oceanfront": 700 };
    const ferryNames = {
        th: { "บุญศิริ": "บุญศิริ", "เสือดำโก": "เสือดำโก", "เกาะกูด เอกซ์เพรส": "เกาะกูด เอกซ์เพรส", "Oceanfront": "Oceanfront" },
        en: { "บุญศิริ": "Boonsiri", "เสือดำโก": "Seudamgo", "เกาะกูด เอกซ์เพรส": "KohKood Express", "Oceanfront": "Oceanfront" }
    };

    const translations = {
        th: { 
            calcBtn: "คำนวณราคาห้องพักและตั๋วเรือ", 
            unitPerson: "ท่าน", unitDay: "วัน", unitNight: "คืน", unitCurrency: "บาท", unitRoom: "ห้อง",
            totalLabel: "รวมเป็นเงินสุทธิ", forLabel: "สำหรับ", withBf: "รวมอาหารเช้า และกิจกรรมฟรีภายในรีสอร์ท",
            roomPriceLabel: "ราคา :", discLabel: "ส่วนลด", adultExt: "เตียงเสริมผู้ใหญ่ (10+ ปี)",
            childExt: "เตียงเสริมเด็ก (4-9 ปี)", childBf: "อาหารเช้าเด็ก 4-9 ปี (พักร่วมเตียงหลัก)",
            babyInfo: "เด็ก 0-3 ปี (Free Baby Cot)", peakLabel: "ช่วง Peak period",
            ferryHeader: "--- ข้อมูลตั๋วเรือ ---", ferryRound: "ไป - กลับ", ferryIn: "ขาไป", ferryOut: "ขากลับ",
            ferryFree: "ตั๋วเรือฟรี (อายุ 0-4 ปี)", companyPrefix: "ตั๋วเรือบริษัท", ticketSuffix: "",
            days: ["วันอาทิตย์", "วันจันทร์", "วันอังคาร", "วันพุธ", "วันพฤหัสบดี", "วันศุกร์", "วันเสาร์"],
            months: ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"]
        },
        en: { 
            calcBtn: "Calculate All Prices", 
            unitPerson: "person(s)", unitDay: "day(s)", unitNight: "night(s)", unitCurrency: "Baht", unitRoom: "Room",
            totalLabel: "Total Net Amount", forLabel: "for", withBf: "including breakfast and resort activities",
            roomPriceLabel: "Price :", discLabel: "Discount", adultExt: "Extra bed Adult (10+ yrs)",
            childExt: "Extra bed Child (4-9 yrs)", childBf: "Breakfast child 4-9 yrs (Sharing bed)",
            babyInfo: "Child 0-3 yrs (Free Baby Cot)", peakLabel: "Peak period",
            ferryHeader: "--- Boat Ticket Information ---", ferryRound: "Round Trip", ferryIn: "Arrival", ferryOut: "Departure",
            ferryFree: "Free Ticket (Aged 0-4 yrs)", companyPrefix: "", ticketSuffix: " Ticket",
            days: ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            months: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]
        }
    };

    const pricing = {
        High: { 'Twin Villa': [3800, 4300], 'Deluxe Villa': [4500, 5000], 'Deluxe Pool Villa': [5900, 6400], 'Beachfront Pool Villa': [6200, 6700], 'Canopy Pool Villa': [6400, 6900], extA: 1500, extC: 800, bfC: 500 },
        Low: { 'Twin Villa': [2200, 2700], 'Deluxe Villa': [2700, 3200], 'Deluxe Pool Villa': [3900, 4400], 'Beachfront Pool Villa': [4200, 4700], 'Canopy Pool Villa': [4400, 4900], extA: 1200, extC: 600, bfC: 300 },
        Green: { 'Twin Villa': [3000, 3500], 'Deluxe Villa': [3600, 4100], 'Deluxe Pool Villa': [5200, 5700], 'Beachfront Pool Villa': [5500, 6000], 'Canopy Pool Villa': [5700, 6200], extA: 1400, extC: 700, bfC: 400 }
    };

    function setLanguage(lang) {
        currentLang = lang;
        document.getElementById('btn-th').className = lang === 'th' ? 'active' : '';
        document.getElementById('btn-en').className = lang === 'en' ? 'active' : '';
        const t = translations[lang];
        document.getElementById('calculateBtn').innerText = t.calcBtn;
        document.getElementById('lbl-room-type').innerText = lang === 'th' ? "ประเภทห้องพัก" : "Room Type";
        document.getElementById('lbl-checkin').innerText = lang === 'th' ? "เช็คอิน" : "Check-in";
        document.getElementById('lbl-checkout').innerText = lang === 'th' ? "เช็คเอาท์" : "Check-out";
        document.getElementById('lbl-ext-a').innerText = t.adultExt;
        document.getElementById('lbl-ext-c').innerText = t.childExt;
        document.getElementById('lbl-bf-c').innerText = t.childBf;
        document.getElementById('lbl-baby').innerText = t.babyInfo;
        document.getElementById('lbl-disc-label').innerText = lang === 'th' ? "ส่วนลดค่าห้องพัก (%)" : "Room Discount (%)";
        document.getElementById('lbl-ferry-in').innerText = t.ferryIn + " (Arrival)";
        document.getElementById('lbl-ferry-out').innerText = t.ferryOut + " (Departure)";
        document.getElementById('lbl-pax-a').innerText = lang === 'th' ? "ผู้โดยสาร 5 ปีขึ้นไป (จ่ายเต็ม)" : "Passengers 5+ yrs (Full Pay)";
        document.getElementById('lbl-pax-c').innerText = lang === 'th' ? "ผู้โดยสาร 0-4 ปี (เดินทางฟรี)" : "Passengers 0-4 yrs (Free)";
    }

    function getSeason(date) { const m = date.getMonth() + 1; const d = date.getDate(); if (m === 12 || (m >= 1 && m <= 5)) return 'High'; if (m === 6 || (m >= 7 && m < 10) || (m === 10 && d <= 15)) return 'Low'; return 'Green'; }
    function isPeak(date) { const m = date.getMonth() + 1; const d = date.getDate(); return ((m === 12 && d >= 20) || (m === 1 && d <= 10) || (m === 4 && d >= 12 && d <= 16)); }

    function calculate() {
        const roomType = document.getElementById('roomType').value;
        const dIn = new Date(document.getElementById('checkIn').value);
        const dOut = new Date(document.getElementById('checkOut').value);
        const disc = parseFloat(document.getElementById('discountPercent').value) || 0;

        if (isNaN(dIn) || isNaN(dOut) || dOut <= dIn) { alert(currentLang === 'th' ? "กรุณาระบุวันที่เข้าพัก" : "Please select valid dates"); return; }

        const t = translations[currentLang];
        let roomTotal = 0, nights = 0, peakNights = 0;
        let detail = `Rest Sea Resort\n${roomType}\n`;

        const formatD = (date) => {
            const d = t.days[date.getDay()], day = date.getDate(), m = t.months[date.getMonth()], y = currentLang === 'th' ? date.getFullYear() + 543 : date.getFullYear();
            return currentLang === 'th' ? `${d} ที่ ${day} / ${m} / ${y}` : `${d}, ${m} ${day}, ${y}`;
        };
        detail += `${formatD(dIn)} - ${formatD(dOut)}\n`;

        let curr = new Date(dIn);
        while (curr < dOut) {
            nights++;
            const s = getSeason(curr);
            const isWk = (curr.getDay() === 5 || curr.getDay() === 6);
            let nightPrice = pricing[s][roomType][isWk ? 1 : 0];
            if (isPeak(curr)) { nightPrice += 1000; peakNights++; }
            let finalPrice = nightPrice * (1 - (disc / 100));
            roomTotal += finalPrice;
            const dateStr = `${curr.getDate()}/${curr.getMonth()+1}/${currentLang === 'th' ? curr.getFullYear()+543 : curr.getFullYear()}`;
            detail += `${s} Season - ${dateStr} ${t.roomPriceLabel} ${finalPrice.toLocaleString()} ${t.unitCurrency}${disc > 0 ? ` (${t.discLabel} ${disc}%)` : ''}\n`;
            curr.setDate(curr.getDate() + 1);
        }

        const addEx = (val, lbl, key) => {
            if (val > 0) {
                let sub = 0; let tmp = new Date(dIn);
                while(tmp < dOut) { sub += (pricing[getSeason(tmp)][key] * val); tmp.setDate(tmp.getDate() + 1); }
                roomTotal += sub;
                detail += `${lbl} : ${val} ${t.unitPerson} x ${nights} ${t.unitDay} = ${sub.toLocaleString()} ${t.unitCurrency}\n`;
            }
        };
        addEx(parseInt(document.getElementById('extAdult').value), t.adultExt, 'extA');
        addEx(parseInt(document.getElementById('extChild').value), t.childExt, 'extC');
        addEx(parseInt(document.getElementById('bfChild').value), t.childBf, 'bfC');
        
        if(parseInt(document.getElementById('babyCot').value) > 0) detail += `${t.babyInfo} : ${document.getElementById('babyCot').value} ${t.unitPerson} x ${nights} ${t.unitDay} = 0 ${t.unitCurrency}\n`;
        if (peakNights > 0) detail += `${t.peakLabel} : ${peakNights} ${t.unitNight}\n`;

        const fInKey = document.getElementById('ferryIn').value;
        const fOutKey = document.getElementById('ferryOut').value;
        const pAdult = parseInt(document.getElementById('paxAdult').value) || 0;
        const pChild = parseInt(document.getElementById('paxChild').value) || 0;
        let ferryTotal = 0;

        if (pAdult > 0 || pChild > 0) {
            detail += `\n${t.ferryHeader}\n`;
            const nameIn = ferryNames[currentLang][fInKey];
            const nameOut = ferryNames[currentLang][fOutKey];

            if (fInKey !== 'none' && fOutKey !== 'none' && fInKey === fOutKey) {
                const roundPrice = ferryPrice[fInKey] * 2;
                const sub = roundPrice * pAdult;
                ferryTotal += sub;
                detail += `${t.companyPrefix} ${nameIn}${t.ticketSuffix} ${t.ferryRound} ${t.forLabel} ${pAdult} ${t.unitPerson} : ${roundPrice.toLocaleString()} x ${pAdult}${t.unitPerson} = ${sub.toLocaleString()} ${t.unitCurrency}\n`;
            } else {
                if (fInKey !== 'none') {
                    const sub = ferryPrice[fInKey] * pAdult;
                    ferryTotal += sub;
                    detail += `${t.companyPrefix} ${nameIn}${t.ticketSuffix} ${t.ferryIn} ${pAdult} ${t.unitPerson} : ${ferryPrice[fInKey].toLocaleString()} x ${pAdult}${t.unitPerson} = ${sub.toLocaleString()} ${t.unitCurrency}\n`;
                }
                if (fOutKey !== 'none') {
                    const sub = ferryPrice[fOutKey] * pAdult;
                    ferryTotal += sub;
                    detail += `${t.companyPrefix} ${nameOut}${t.ticketSuffix} ${t.ferryOut} ${pAdult} ${t.unitPerson} : ${ferryPrice[fOutKey].toLocaleString()} x ${pAdult}${t.unitPerson} = ${sub.toLocaleString()} ${t.unitCurrency}\n`;
                }
            }
            if (pChild > 0) detail += `${t.ferryFree} : ${pChild} ${t.unitPerson}\n`;
        }

        const totalNet = roomTotal + ferryTotal;
        const totalPaxInRoom = 2 + (parseInt(document.getElementById('extAdult').value) || 0) + 
                               (parseInt(document.getElementById('extChild').value) || 0) + 
                               (parseInt(document.getElementById('bfChild').value) || 0) + 
                               (parseInt(document.getElementById('babyCot').value) || 0);
        
        detail += `\n${t.totalLabel} ${Math.round(totalNet).toLocaleString()} ${t.unitCurrency} / ${t.unitRoom} ${t.forLabel} ${totalPaxInRoom} ${t.unitPerson} ${t.withBf}`;

        const resArea = document.getElementById('resultArea');
        resArea.innerText = detail;
        resArea.style.display = 'block';

        const el = document.createElement('textarea');
        el.value = detail; document.body.appendChild(el); el.select();
        document.execCommand('copy'); document.body.removeChild(el);
        const toast = document.getElementById('toast');
        toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 2500);
    }
</script>

</body>
</html>
